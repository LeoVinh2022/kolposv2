<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FBF6F3">
<title>KOL Nails Studio — Nhập bill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF6F3;
    --card:#FFFFFF;
    --border:#F0DFD6;
    --text:#3A2E2A;
    --muted:#9C8B83;
    --accent:#A9776B;
    --accent-dark:#8C5F53;
    --gold:#C9A227;
    --chip:#F3E4DC;
    --success:#7C9473;
    --error:#B65C4B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Be Vietnam Pro', sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:48px;
  }
  .wrap{max-width:520px; margin:0 auto; padding:28px 20px 20px;}

  /* Logo */
  .brand{text-align:center; margin-bottom:26px;}
  .brand h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:34px;
    letter-spacing:1px;
    margin:0;
    color:var(--accent-dark);
  }
  .brand .stroke{
    width:120px; height:10px; margin:2px auto 6px;
    display:block;
  }
  .brand p{
    margin:0;
    font-size:11px;
    letter-spacing:4px;
    color:var(--muted);
    text-transform:uppercase;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 4px 18px rgba(169,119,107,0.06);
  }

  label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--accent-dark);
    margin-bottom:8px;
  }
  .field{margin-bottom:20px;}
  .field:last-child{margin-bottom:0;}

  input[type=text], input[type=number], textarea{
    width:100%;
    border:1.5px solid var(--border);
    background:#FFFDFC;
    border-radius:12px;
    padding:12px 14px;
    font-family:inherit;
    font-size:16px;
    color:var(--text);
    outline:none;
    transition:border-color .15s;
  }
  input:focus, textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical; min-height:60px;}

  .price-row{display:flex; align-items:center; gap:10px;}
  .price-row input{flex:1;}
  .price-preview{
    font-size:13px; color:var(--muted); margin-top:6px;
  }
  .price-preview b{color:var(--accent-dark);}

  /* Tag input dịch vụ */
  .tag-input-row{display:flex; gap:8px;}
  .tag-input-row input{flex:1;}
  .btn-add{
    border:none; background:var(--chip); color:var(--accent-dark);
    border-radius:12px; padding:0 18px; font-weight:600; font-size:20px;
    cursor:pointer;
  }
  .tags{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;}
  .tag{
    background:var(--chip); color:var(--accent-dark);
    border-radius:999px; padding:6px 10px 6px 14px;
    font-size:13px; display:flex; align-items:center; gap:6px;
  }
  .tag button{
    border:none; background:none; color:var(--accent-dark);
    font-size:15px; cursor:pointer; opacity:.6; padding:0 2px;
  }

  /* Toggle buttons */
  .choice-grid{display:flex; gap:10px; flex-wrap:wrap;}
  .choice{
    flex:1; min-width:90px;
    text-align:center;
    padding:11px 8px;
    border-radius:12px;
    border:1.5px solid var(--border);
    background:#FFFDFC;
    font-size:14px; font-weight:500;
    color:var(--text);
    cursor:pointer;
    user-select:none;
    transition:.15s;
  }
  .choice.selected{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
    font-weight:600;
  }

  .btn-submit{
    width:100%;
    border:none;
    background:var(--accent-dark);
    color:#fff;
    font-family:inherit;
    font-size:16px;
    font-weight:600;
    letter-spacing:.5px;
    padding:16px;
    border-radius:14px;
    cursor:pointer;
    margin-top:4px;
  }
  .btn-submit:active{transform:scale(0.98);}
  .btn-submit:disabled{opacity:.5;}

  /* Recent list */
  .recent h2{
    font-size:13px; letter-spacing:1px; text-transform:uppercase;
    color:var(--muted); margin:0 0 10px 4px;
  }
  .recent-item{
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:12px 16px; margin-bottom:8px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .recent-item .info{font-size:13px; color:var(--text);}
  .recent-item .info .name{font-weight:600;}
  .recent-item .info .sub{color:var(--muted); font-size:12px;}
  .recent-item .price{font-weight:700; color:var(--accent-dark); font-size:14px;}

  /* Toast */
  #toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--text); color:#fff; padding:12px 22px; border-radius:12px;
    font-size:14px; opacity:0; pointer-events:none; transition:.25s;
    max-width:90%; text-align:center; z-index:50;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  #toast.error{background:var(--error);}
  #toast.success{background:var(--success);}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <h1>KOL</h1>
    <svg class="stroke" viewBox="0 0 120 10"><path d="M2 6 Q 30 2, 60 6 T 118 5" stroke="#C9A227" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <p>Nails Studio</p>
  </div>

  <form class="card" id="billForm">
    <div class="field">
      <label>Tên khách hàng</label>
      <input type="text" id="customerName" placeholder="VD: Chị Lan" autocomplete="off">
    </div>

    <div class="field">
      <label>Dịch vụ</label>
      <div class="tag-input-row">
        <input type="text" id="serviceInput" placeholder="VD: Sơn gel" autocomplete="off">
        <button type="button" class="btn-add" id="addServiceBtn">+</button>
      </div>
      <div class="tags" id="tagList"></div>
    </div>

    <div class="field">
      <label>Giá tiền (nhập x1000)</label>
      <div class="price-row">
        <input type="number" id="price" placeholder="VD: 150" inputmode="numeric">
      </div>
      <div class="price-preview">Thành tiền: <b id="pricePreview">0 ₫</b></div>
    </div>

    <div class="field">
      <label>Hình thức thanh toán</label>
      <div class="choice-grid" id="paymentGrid">
        <div class="choice" data-value="Tiền mặt">Tiền mặt</div>
        <div class="choice" data-value="Chuyển khoản">Chuyển khoản</div>
      </div>
    </div>

    <div class="field">
      <label>Nhân viên thực hiện</label>
      <div class="choice-grid" id="staffGrid">
        <div class="choice" data-value="Duyên">Duyên</div>
        <div class="choice" data-value="Thy">Thy</div>
        <div class="choice" data-value="Thuỳ">Thuỳ</div>
        <div class="choice" data-value="Trân">Trân</div>
        <div class="choice" data-value="Ngọc">Ngọc</div>
      </div>
    </div>

    <div class="field">
      <label>Ghi chú (không bắt buộc)</label>
      <textarea id="note" placeholder="Ghi chú thêm nếu cần..."></textarea>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Lưu hoá đơn</button>
  </form>

  <div class="recent">
    <h2>Hoá đơn gần đây</h2>
    <div id="recentList"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ======= CẤU HÌNH: dán URL Web App Apps Script vào đây =======
const APP_URL = "https://script.google.com/macros/s/AKfycbzl4MrN4wt1MQ6AoZW4Aw1LvrXUjskTJF3pQ7gR_icysI-ktg7ItSWpDSNoAqbQsi_8/exec";
// ===============================================================

let services = [];
let selectedPayment = null;
let selectedStaff = null;

const serviceInput = document.getElementById('serviceInput');
const tagList = document.getElementById('tagList');
const priceInput = document.getElementById('price');
const pricePreview = document.getElementById('pricePreview');

function renderTags(){
  tagList.innerHTML = '';
  services.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'tag';
    el.innerHTML = `<span>${s}</span><button type="button" data-i="${i}">×</button>`;
    tagList.appendChild(el);
  });
  tagList.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      services.splice(Number(btn.dataset.i), 1);
      renderTags();
    });
  });
}

function addService(){
  const v = serviceInput.value.trim();
  if(!v) return;
  services.push(v);
  serviceInput.value = '';
  renderTags();
  serviceInput.focus();
}

document.getElementById('addServiceBtn').addEventListener('click', addService);
serviceInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){ e.preventDefault(); addService(); }
});

priceInput.addEventListener('input', () => {
  const v = Number(priceInput.value || 0) * 1000;
  pricePreview.textContent = v.toLocaleString('vi-VN') + ' ₫';
});

function setupChoiceGrid(gridId, onSelect){
  const grid = document.getElementById(gridId);
  grid.querySelectorAll('.choice').forEach(el => {
    el.addEventListener('click', () => {
      grid.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      onSelect(el.dataset.value);
    });
  });
}
setupChoiceGrid('paymentGrid', v => selectedPayment = v);
setupChoiceGrid('staffGrid', v => selectedStaff = v);

function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (type || '');
  setTimeout(() => t.className = '', 2200);
}

function loadRecent(){
  const list = JSON.parse(localStorage.getItem('kol_recent') || '[]');
  const el = document.getElementById('recentList');
  el.innerHTML = '';
  if(list.length === 0){
    el.innerHTML = '<div style="color:var(--muted); font-size:13px; text-align:center; padding:12px;">Chưa có hoá đơn nào</div>';
    return;
  }
  list.slice(0,5).forEach(item => {
    const div = document.createElement('div');
    div.className = 'recent-item';
    div.innerHTML = `
      <div class="info">
        <div class="name">${item.customerName || '(Không tên)'}</div>
        <div class="sub">${item.employee} · ${item.services}</div>
      </div>
      <div class="price">${Number(item.price*1000).toLocaleString('vi-VN')} ₫</div>`;
    el.appendChild(div);
  });
}
function saveRecent(entry){
  const list = JSON.parse(localStorage.getItem('kol_recent') || '[]');
  list.unshift(entry);
  localStorage.setItem('kol_recent', JSON.stringify(list.slice(0,20)));
  loadRecent();
}
loadRecent();

document.getElementById('billForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  // Tự động chốt dịch vụ đang gõ dở (nếu nhân viên quên bấm nút + hoặc Enter)
  if(serviceInput.value.trim()){ addService(); }

  if(!priceInput.value){ showToast('Vui lòng nhập giá tiền', 'error'); return; }
  if(!selectedPayment){ showToast('Vui lòng chọn hình thức thanh toán', 'error'); return; }
  if(!selectedStaff){ showToast('Vui lòng chọn nhân viên', 'error'); return; }
  if(services.length === 0){ showToast('Vui lòng nhập ít nhất 1 dịch vụ', 'error'); return; }

  const payload = {
    txId: 'tx_' + Date.now() + '_' + Math.random().toString(36).slice(2,8),
    customerName: document.getElementById('customerName').value.trim(),
    services: services.join(', '),
    price: priceInput.value,
    payment: selectedPayment,
    employee: selectedStaff,
    note: document.getElementById('note').value.trim()
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Đang lưu...';

  try {
    if(APP_URL.indexOf('DÁN_URL') !== -1){
      throw new Error('Chưa cấu hình APP_URL trong file index.html');
    }
    const res = await fetch(APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    if(result.status === 'success' || result.status === 'duplicate'){
      showToast('Đã lưu hoá đơn ✓', 'success');
      saveRecent(payload);
      document.getElementById('billForm').reset();
      services = []; renderTags();
      selectedPayment = null; selectedStaff = null;
      document.querySelectorAll('.choice.selected').forEach(c => c.classList.remove('selected'));
      pricePreview.textContent = '0 ₫';
    } else {
      throw new Error(result.message || 'Lỗi không xác định');
    }
  } catch(err){
    showToast('Lỗi: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Lưu hoá đơn';
  }
});
</script>
</body>
</html>
